version: '3.8'

services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3010}:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev -- --host
    env_file:
      - .env
    environment:
      - NODE_ENV=development

  fetch-data:
    build: .
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - .env
    command: node scripts/fetch-market-data.mjs
    profiles:
      - tools

  fetch-names:
    build: .
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - .env
    command: node scripts/fetch_station_names.js
    profiles:
      - tools

  build:
    build: .
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - .env
    command: sh -c "node scripts/fetch_station_names.js && node scripts/fetch-market-data.mjs && npm run build"
    profiles:
      - tools
