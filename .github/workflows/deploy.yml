name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *' # Tous les jours à 3h00 UTC (4h00/5h00 heure française)

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch official prices from DGEC
        run: node scripts/fetch-dgec-prices.mjs

      - name: Commit updated snapshots to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[bot] chore: auto-update daily prices snapshot"
          file_pattern: 'data/sources/*.js data/InseeFuelHistory.js'

      - name: Fetch market data from FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/fetch-market-data.mjs

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
